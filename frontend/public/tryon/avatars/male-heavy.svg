<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 500" width="200" height="500">
  <defs>
    <style>
      .silhouette { fill: #E5E5E5; }
    </style>
  </defs>
  <!-- Base Silhouette -->
  <!-- Neck/Head area (head will be overlaid by photo) -->
  <circle cx="100" cy="40" r="20" class="silhouette" />
  
  <!-- Torso -->
  <path d="M 50 70 
           Q 100 60 150 70 
           C 155 150 145 200 142.5 250 
           L 57.5 250 
           C 55 200 45 150 50 70 Z" 
        class="silhouette" />
        
  <!-- Arms -->
  <path d="M 50 70 
           Q 30 150 40 250 
           L 60 250
           Q 50 150 60 70 Z" class="silhouette" />
  <path d="M 150 70 
           Q 170 150 160 250 
           L 140 250
           Q 150 150 140 70 Z" class="silhouette" />
           
  <!-- Legs -->
  <path d="M 57.5 250 
           L 95 480 L 115 480 L 90 250 Z" class="silhouette" />
  <path d="M 142.5 250 
           L 105 480 L 85 480 L 110 250 Z" class="silhouette" />
</svg>